<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="每日阅读">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>每日阅读</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, -apple-system-font, "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            padding: 20px 20px 100px 20px;
        }

        .article {
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .article:last-child {
            border-bottom: none;
        }

        .article-date {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .article-title {
            font-size: 28px !important;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .article-content {
            font-size: 20px !important;
            line-height: 2;
            color: rgba(255, 255, 255, 0.75);
            text-align: justify;
        }

        /* 段落 */
        .article-content p {
            margin-bottom: 16px;
            text-align: justify;
        }

        /* 标题 */
        .article-content h1 {
            font-size: 22px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin: 32px 0 16px 0;
            line-height: 1.4;
        }

        .article-content h2 {
            font-size: 23px !important;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin: 28px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            line-height: 1.5;
        }

        .article-content h3 {
            font-size: 21px !important;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin: 24px 0 10px 0;
            line-height: 1.5;
        }

        .article-content h4 {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.75);
            margin: 20px 0 8px 0;
            line-height: 1.5;
        }

        /* 引用块 */
        .article-content blockquote {
            border-left: 3px solid rgba(255, 165, 0, 0.6);
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 16px;
            margin: 16px 0;
            font-size: 18px !important;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.8;
            border-radius: 0 6px 6px 0;
        }

        .article-content blockquote p {
            margin-bottom: 0;
        }

        /* 代码块 */
        .article-content pre {
            background: rgba(255, 255, 255, 0.06);
            padding: 14px 16px;
            margin: 16px 0;
            border-radius: 8px;
            font-size: 16px !important;
            line-height: 1.7;
            overflow-x: auto;
            color: rgba(255, 255, 255, 0.65);
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            -webkit-overflow-scrolling: touch;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .article-content pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }

        /* 内联代码 */
        .article-content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 列表 */
        .article-content ul,
        .article-content ol {
            margin: 12px 0 16px 20px;
            line-height: 2;
        }

        .article-content li {
            margin-bottom: 6px;
        }

        /* 表格 - 手机友好 */
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0 20px 0;
            font-size: 15px !important;
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .article-content thead {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .article-content tbody {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .article-content tr {
            display: table-row;
        }

        .article-content th,
        .article-content td {
            display: table-cell;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-align: left;
            vertical-align: top;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .article-content thead th {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 0;
        }

        .article-content tbody tr:last-child td {
            border-bottom: none;
        }

        .article-content tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        /* 强调文本 */
        .article-content strong {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }

        .article-content em {
            color: rgba(255, 255, 255, 0.65);
            font-style: italic;
        }

        /* 分隔线 */
        .article-content hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 28px 0;
        }

        /* 导航按钮容器 */
        .nav-buttons {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .nav-btn {
            width: 56px;
            height: 44px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            letter-spacing: 1px;
            -webkit-user-select: none;
            user-select: none;
        }

        .nav-btn:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .nav-btn svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.8);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        /* 无文章状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }



        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }

        /* 超宽屏幕适配 */
        @media (min-width: 768px) {
            .container {
                max-width: 680px;
                margin: 0 auto;
                padding: 40px 20px 100px 20px;
            }

            .article-content {
                font-size: 20px;
            }

            .article-content table {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="loading">正在加载...</div>
    </div>

    <div class="nav-buttons">
        <div class="nav-btn" id="prevBtn" onclick="goToTop()">
            <svg viewBox="0 0 24 24">
                <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
            </svg>
        </div>
        <div class="nav-btn" id="nextBtn" onclick="goToNext()">
            <svg viewBox="0 0 24 24">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/>
            </svg>
        </div>
    </div>

    <script>
        let articles = [];
        let currentIndex = 0;

        async function loadArticles() {
            try {
                const response = await fetch('articles/list.json?t=' + Date.now());
                articles = await response.json();
                
                if (articles.length === 0) {
                    document.getElementById('container').innerHTML = '<div class="empty">暂无文章</div>';
                    return;
                }

                // 按日期正序排列（最旧的在上，最新的在下）
                articles.sort((a, b) => new Date(a.date) - new Date(b.date));

                await renderArticles();
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('container').innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
            }
        }

        async function renderArticles() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            for (let i = 0; i < articles.length; i++) {
                const article = articles[i];
                
                // 加载文章内容
                let content = article.content || '';
                if (article.file) {
                    try {
                        const response = await fetch(`articles/${article.file}?t=` + Date.now());
                        const data = await response.json();
                        content = data.content;
                    } catch (e) {
                        console.error('文章加载失败:', article.file, e);
                        content = '内容加载失败';
                    }
                }

                const articleHtml = `
                    <div class="article" id="article-${i}" data-index="${i}">
                        <div class="article-date">${formatDate(article.date)}</div>
                        ${article.title ? `<div class="article-title">${escapeHtml(article.title)}</div>` : ''}
                        <div class="article-content">${formatContent(content, article.title)}</div>
                    </div>
                `;
                container.innerHTML += articleHtml;
            }

            // 默认显示最新文章（最后一篇）
            currentIndex = articles.length - 1;
            
            // 滚动到当前文章
            setTimeout(() => {
                scrollToArticle(currentIndex);
                updateNavButtons();
            }, 150);


        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekDay}`;
        }

        function formatContent(content, title) {
            // 如果内容已经是 HTML（包含标签），直接返回（去掉开头重复标题）
            if (content.includes('<') && (content.includes('<p>') || content.includes('<table>'))) {
                // 去掉开头的 h1 标题（如果和文章标题重复）
                const h1Match = content.match(/^<h1>(.*?)<\/h1>\s*/);
                if (h1Match && title) {
                    const h1Text = h1Match[1];
                    if (h1Text === title || title.includes(h1Text) || h1Text.includes(title)) {
                        content = content.substring(h1Match[0].length);
                    }
                }
                return content;
            }

            // 纯文本回退：去掉开头的日期格式，去掉重复标题，转成段落
            content = content.replace(/^\d{4}\.\d{1,2}\.\d{1,2}\s*\n?/, '');
            const firstLine = content.split('\n')[0].trim();
            if (firstLine && title && (
                firstLine === title || 
                firstLine.includes(title) || 
                title.includes(firstLine) ||
                firstLine.replace(/[《》【】]/g, '') === title.replace(/[《》【】]/g, '')
            )) {
                content = content.substring(firstLine.length).trim();
            }
            const paragraphs = content.split(/\n+/).filter(p => p.trim());
            return paragraphs.map(p => `<p>${p.trim()}</p>`).join('');
        }

        function scrollToArticle(index) {
            const article = document.getElementById(`article-${index}`);
            if (article) {
                article.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (currentIndex >= articles.length - 1) {
                nextBtn.classList.add('disabled');
            } else {
                nextBtn.classList.remove('disabled');
            }
            
            if (currentIndex <= 0) {
                prevBtn.classList.add('disabled');
            } else {
                prevBtn.classList.remove('disabled');
            }
        }

        function goToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToNext() {
            if (currentIndex < articles.length - 1) {
                currentIndex++;
                scrollToArticle(currentIndex);
                updateNavButtons();
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', loadArticles);

        // 监听页面返回（缓存恢复）
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                loadArticles();
            }
        });
    </script>
</body>
</html>
