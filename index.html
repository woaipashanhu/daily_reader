<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>每日阅读</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, -apple-system-font, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            padding: 20px 20px 80px 20px;
        }

        .article {
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .article:last-child {
            border-bottom: none;
        }

        .article-date {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .article-title {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .article-content {
            font-size: 18px;
            line-height: 2;
            color: rgba(255, 255, 255, 0.9);
            text-align: justify;
        }

        .article-content p {
            margin-bottom: 16px;
        }

        /* 向下箭头按钮 */
        .scroll-bottom {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .scroll-bottom:active {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .scroll-bottom svg {
            width: 24px;
            height: 24px;
            fill: rgba(255, 255, 255, 0.8);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        /* 无文章状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        /* 分隔线提示 */
        .divider-text {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 2px;
        }

        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="loading">正在加载...</div>
    </div>

    <div class="scroll-bottom" id="scrollBottom" onclick="scrollToBottom()">
        <svg viewBox="0 0 24 24">
            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
        </svg>
    </div>

    <script>
        // 文章列表（由更新脚本自动生成）
        let articles = [];

        async function loadArticles() {
            try {
                const response = await fetch('articles/list.json');
                articles = await response.json();
                
                if (articles.length === 0) {
                    document.getElementById('container').innerHTML = '<div class="empty">暂无文章</div>';
                    return;
                }

                // 按日期倒序排列（最新的在前/在上）
                articles.sort((a, b) => new Date(b.date) - new Date(a.date));

                await renderArticles();
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('container').innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
            }
        }

        async function renderArticles() {
            const container = document.getElementById('container');
            container.innerHTML = '';

            for (let i = 0; i < articles.length; i++) {
                const article = articles[i];
                
                // 加载文章内容
                let content = article.content || '';
                if (article.file) {
                    try {
                        const response = await fetch(`articles/${article.file}`);
                        const data = await response.json();
                        content = data.content;
                    } catch (e) {
                        content = '内容加载失败';
                    }
                }

                const articleHtml = `
                    <div class="article" id="article-${article.date}">
                        <div class="article-date">${formatDate(article.date)}</div>
                        ${article.title ? `<div class="article-title">${article.title}</div>` : ''}
                        <div class="article-content">${formatContent(content)}</div>
                    </div>
                    ${i < articles.length - 1 ? '<div class="divider-text">↑ 往期内容 ↑</div>' : ''}
                `;
                container.innerHTML += articleHtml;
            }

            // 页面加载后滚动到最底部（显示最新文章）
            setTimeout(() => {
                scrollToBottom();
            }, 100);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekDay}`;
        }

        function formatContent(content) {
            // 将换行符转换为段落
            const paragraphs = content.split(/\n+/).filter(p => p.trim());
            return paragraphs.map(p => `<p>${p.trim()}</p>`).join('');
        }

        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', loadArticles);

        // 监听页面返回
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                loadArticles();
            }
        });
    </script>
</body>
</html>
